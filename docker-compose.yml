services:
  bookmarks:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bookmarks
    env_file:
      - .env
    environment:
      BOOKMARKS_ROOT: /srv/webdata/bookmarks
      BOOKMARKS_DB_PATH: /srv/webdata/bookmarks/data/bookmarks.sqlite
      BOOKMARKS_MEDIA_ROOT: /srv/webdata/bookmarks/media
      BOOKMARKS_LOG_DIR: /srv/webdata/bookmarks/logs
    ports:
      - "${BOOKMARKS_HOST_PORT:-8015}:8000"
    volumes:
      - /srv/webdata/bookmarks:/srv/webdata/bookmarks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
