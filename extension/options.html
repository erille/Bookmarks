<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmarks Options</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-body">
    <main class="options-shell">
      <h1>Bookmarks</h1>

      <form id="optionsForm" class="stack">
        <label>
          Base URL
          <input id="baseUrl" type="url" placeholder="http://localhost:8015" required>
        </label>

        <label>
          API token
          <input id="apiToken" type="password" autocomplete="off" required>
        </label>

        <div class="button-row">
          <button type="submit">Save</button>
          <button type="button" id="testConnection" class="secondary-button">Test</button>
        </div>
      </form>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
