<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmarks</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <header class="popup-header">
        <h1>Bookmarks</h1>
        <button type="button" id="openOptions" class="secondary-button">Options</button>
      </header>

      <form id="bookmarkForm" class="stack">
        <label>
          URL
          <input id="sourceUrl" type="url" required>
        </label>

        <label>
          Title
          <input id="title" type="text">
        </label>

        <fieldset>
          <legend>Categories</legend>
          <div id="categoryList" class="category-list"></div>
          <div id="selectedCategories" class="selected-list"></div>
        </fieldset>

        <div class="inline-row">
          <label class="grow">
            New category
            <input id="newCategory" type="text">
          </label>
          <button type="button" id="addCategory" class="secondary-button">Add</button>
        </div>

        <label>
          Tags
          <input id="tags" type="text" placeholder="guitar, live, tutorial">
        </label>

        <label>
          Mode
          <select id="mode">
            <option value="download_media">Download media</option>
            <option value="bookmark_only">Bookmark only</option>
          </select>
        </label>

        <label>
          Visibility
          <select id="visibility">
            <option value="public" selected>Public</option>
            <option value="private">Private</option>
          </select>
        </label>

        <button type="submit" id="saveButton">Save</button>
      </form>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
